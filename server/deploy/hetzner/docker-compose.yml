# Subsumio engine — single-box production stack for Hetzner Cloud (EU).
#   db     — Postgres 16 + pgvector (brain + web auth store)
#   engine — the gbrain HTTP API + in-process ingestion worker (parses PDFs,
#            builds embeddings, answers queries) on :3131
#   web    — Next.js dashboard on :3000
#   caddy  — reverse proxy with automatic Let's Encrypt HTTPS for APP_DOMAIN
#            and ENGINE_DOMAIN
#
# Bring up:  cd server/deploy/hetzner && cp .env.example .env && <edit .env> &&
#            docker compose up -d --build
# All secrets come from .env (never committed). Files live on named volumes;
# point APP_DOMAIN + ENGINE_DOMAIN DNS A-records at this box first so Caddy
# can issue TLS.

services:
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    environment:
      # Keep ClamAV's INSTREAM ceiling aligned with the application's 500 MB
      # document limit. The image default is only 100 MB and otherwise causes
      # valid large uploads to fail closed as "scanner unavailable".
      CLAMD_CONF_StreamMaxLength: "524288000"
      CLAMD_CONF_MaxFileSize: "524288000"
      CLAMD_CONF_MaxScanSize: "1073741824"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    # clamd stays on the private compose network; no host port is published.

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-subsumio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-subsumio}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subsumio} -d ${POSTGRES_DB:-subsumio}"]
      interval: 10s
      timeout: 5s
      retries: 6
    # Published on localhost only — allows SSH-tunnel access for local dev
    # without exposing the DB to the internet. Engine still uses the compose
    # network internally. To tunnel: ssh -L 15432:localhost:5432 subsumio-hetzner
    ports:
      - "127.0.0.1:5432:5432"

  engine:
    build:
      context: ../.. # = server/  (where the Dockerfile lives)
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-subsumio}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-subsumio}
      PORT: "3131"
      SUBSUMIO_HOME: /data
      GBRAIN_HOME: /data # legacy alias for engine internals
      CLAMAV_HOST: clamav:3310
      SUBSUMIO_PRESIGNED_UPLOAD_ENABLED: ${SUBSUMIO_PRESIGNED_UPLOAD_ENABLED:-false}
    volumes:
      - engine-data:/data # uploaded files / vault on durable volume
      # Read-only ADVOKAT export/document mirror. Point the host side at an
      # SMB/CIFS mount or scheduled ADVOKAT export directory.
      - ${ADVOKAT_IMPORT_HOST_PATH:-./imports/advokat}:/imports/advokat:ro
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://localhost:3131/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ../../.. # = repo root (Next.js app)
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_APP_URL: "https://${APP_DOMAIN:?set APP_DOMAIN in .env}"
        NEXT_PUBLIC_SITE_URL: "https://${APP_DOMAIN:?set APP_DOMAIN in .env}"
        NEXT_PUBLIC_DIRECT_UPLOAD_MAX_BYTES: "${NEXT_PUBLIC_DIRECT_UPLOAD_MAX_BYTES:-524288000}"
        NEXT_PUBLIC_ENGINE_URL: "https://${ENGINE_DOMAIN:?set ENGINE_DOMAIN in .env}"
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      SUBSUMIO_API_URL: http://engine:3131
      NEXT_PUBLIC_APP_URL: "https://${APP_DOMAIN:?set APP_DOMAIN in .env}"
      NEXT_PUBLIC_SITE_URL: "https://${APP_DOMAIN:?set APP_DOMAIN in .env}"
      SUBSUMIO_AUTH_DATABASE_URL: postgres://${POSTGRES_USER:-subsumio}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-subsumio}?sslmode=disable
      DATABASE_URL: postgres://${POSTGRES_USER:-subsumio}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-subsumio}?sslmode=disable
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-524288000}
      MAX_TABULAR_UPLOAD_BYTES: ${MAX_TABULAR_UPLOAD_BYTES:-20971520}
      NEXT_PUBLIC_DIRECT_UPLOAD_MAX_BYTES: ${NEXT_PUBLIC_DIRECT_UPLOAD_MAX_BYTES:-524288000}
      NEXT_PUBLIC_ENGINE_URL: "https://${ENGINE_DOMAIN:?set ENGINE_DOMAIN in .env}"
    depends_on:
      db:
        condition: service_healthy
      engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://localhost:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN in .env}
      ENGINE_DOMAIN: ${ENGINE_DOMAIN:?set ENGINE_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - engine

  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      CRON_SECRET: ${CRON_SECRET:?set CRON_SECRET in .env}
    volumes:
      - ./crontab:/etc/crontab:ro
    entrypoint: >
      sh -c "
        apk add --no-cache curl supercronic &&
        export CRON_SECRET &&
        supercronic /etc/crontab
      "

  # Encrypted offsite backup + restore-verification (restic → Hetzner Object
  # Storage / Storage Box). Daily pg_dump + original files; weekly restore drill.
  # Inert until the BACKUP_* vars are set in .env — the stack runs fine without
  # them (the service just logs that the repo isn't configured and idles).
  backup:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # restic repo + encryption key (offline-stored password!)
      RESTIC_REPOSITORY: ${BACKUP_RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${BACKUP_RESTIC_PASSWORD:-}
      # s3: repos (Hetzner Object Storage / R2 / S3)
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      # Postgres connection (same network as db)
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-subsumio}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-subsumio}
      # Alert channel (reused from the queue-alert watchdog)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-Subsumio <hello@subsum.io>}
      QUEUE_ALERT_EMAIL: ${QUEUE_ALERT_EMAIL:-}
    volumes:
      # Original files — only needed when STORAGE_BACKEND=local. Harmless if s3.
      - engine-data:/data:ro
      - ./backup:/backup:ro
    entrypoint: >
      sh -c "
        apk add --no-cache restic postgresql16-client curl supercronic ca-certificates &&
        if [ -z \"$RESTIC_REPOSITORY\" ]; then
          echo '[backup] BACKUP_RESTIC_REPOSITORY not set — backup disabled, idling.' ;
          while true; do sleep 86400; done ;
        else
          supercronic /backup/crontab ;
        fi
      "

volumes:
  db-data:
  engine-data:
  clamav-data:
  caddy-data:
  caddy-config:
