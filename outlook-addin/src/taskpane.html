<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subsumio für Outlook</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 16px; background: #0a0a18; color: #e8e8f0; font-size: 13px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1e1e3a; }
    .header img { width: 24px; height: 24px; border-radius: 6px; }
    .header h1 { font-size: 15px; margin: 0; color: #e8e8f0; }
    .section { margin-bottom: 16px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #8a8aa8; margin-bottom: 8px; font-weight: 600; }
    input, select, textarea { width: 100%; background: #0d0d1a; border: 1px solid #1e1e3a; border-radius: 8px; padding: 8px 10px; color: #e8e8f0; font-size: 13px; margin-bottom: 8px; font-family: inherit; }
    input::placeholder, textarea::placeholder { color: #4a4a6a; }
    textarea { resize: vertical; min-height: 60px; }
    button { width: 100%; background: #6366f1; color: white; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
    button:hover { background: #818cf8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: transparent; border: 1px solid #1e1e3a; color: #8a8aa8; }
    button.secondary:hover { border-color: #6366f1; color: #e8e8f0; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid #1e1e3a; }
    .tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 500; color: #8a8aa8; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: #e8e8f0; }
    .tab.active { color: #6366f1; border-bottom-color: #6366f1; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .case-item { padding: 10px; border: 1px solid #1e1e3a; border-radius: 8px; margin-bottom: 8px; background: #0d0d1a; cursor: pointer; transition: border-color 0.15s; }
    .case-item:hover { border-color: #6366f1; }
    .case-item .title { font-weight: 500; color: #e8e8f0; margin-bottom: 2px; }
    .case-item .meta { font-size: 11px; color: #8a8aa8; }
    .mail-preview { padding: 10px; border: 1px solid #1e1e3a; border-radius: 8px; margin-bottom: 12px; background: #0d0d1a; }
    .mail-preview .subject { font-weight: 600; color: #e8e8f0; margin-bottom: 4px; }
    .mail-preview .from { font-size: 11px; color: #8a8aa8; margin-bottom: 6px; }
    .mail-preview .body { font-size: 12px; color: #a8a8c0; max-height: 100px; overflow-y: auto; white-space: pre-wrap; }
    .status { padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .status.ok { background: #10b98115; border: 1px solid #10b98130; color: #34d399; }
    .status.err { background: #ef444415; border: 1px solid #ef444430; color: #f87171; }
    .status.info { background: #6366f115; border: 1px solid #6366f130; color: #818cf8; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .query-result { padding: 10px; border: 1px solid #1e1e3a; border-radius: 8px; margin-top: 8px; background: #0d0d1a; font-size: 12px; color: #a8a8c0; white-space: pre-wrap; max-height: 300px; overflow-y: auto; line-height: 1.5; }
    .mode-select { display: flex; gap: 4px; margin-bottom: 8px; }
    .mode-btn { flex: 1; padding: 6px; font-size: 11px; border-radius: 6px; border: 1px solid #1e1e3a; background: #0d0d1a; color: #8a8aa8; cursor: pointer; transition: all 0.15s; }
    .mode-btn.active { border-color: #6366f1; color: #6366f1; background: #6366f110; }
  </style>
</head>
<body>
  <div class="header">
    <img src="/icon-192.png" alt="Subsumio">
    <h1>Subsumio</h1>
  </div>

  <div class="section" id="authSection">
    <div class="section-title">API-Key</div>
    <input type="password" id="token" placeholder="sk_live_...">
    <button id="connectBtn" onclick="connect()">Verbinden</button>
    <div style="font-size:11px;color:#4a4a6a;margin-top:8px;line-height:1.5">
      Sie benötigen einen API-Key aus Ihrem Subsumio-Dashboard
      (<a href="https://subsum.eu/dashboard/settings" target="_blank" style="color:#6366f1;text-decoration:none">Einstellungen → API-Keys</a>).
    </div>
  </div>

  <div id="connectedSection" style="display:none;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;border:1px solid #10b98130;border-radius:8px;background:#10b98110">
    <div style="width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0"></div>
    <span style="font-size:12px;color:#34d399;flex:1">Verbunden</span>
    <button class="secondary" style="width:auto;padding:4px 12px;font-size:11px" onclick="disconnect()">Trennen</button>
  </div>

  <div id="status" class="status" style="display:none"></div>

  <div id="mainSection" style="display:none">
    <div class="tab-bar">
      <div class="tab active" data-tab="import" onclick="switchTab('import')">Mail-Import</div>
      <div class="tab" data-tab="query" onclick="switchTab('query')">Brain-Query</div>
    </div>

    <div id="tab-import" class="tab-content active">
      <div class="section">
        <div class="section-title">Aktuelle E-Mail</div>
        <div id="mailPreview" class="mail-preview">
          <div class="subject" id="mailSubject">—</div>
          <div class="from" id="mailFrom">—</div>
          <div class="body" id="mailBody">E-Mail wird geladen…</div>
        </div>
        <button id="importBtn" onclick="importMail()">
          <span id="importBtnText">In Akte importieren</span>
        </button>
      </div>
      <div id="caseMatchSection" class="section" style="display:none">
        <div class="section-title">Passende Akten</div>
        <div id="caseList"></div>
      </div>
    </div>

    <div id="tab-query" class="tab-content">
      <div class="section">
        <div class="section-title">Brain-Query</div>
        <div class="mode-select">
          <div class="mode-btn active" data-mode="balanced" onclick="setMode('balanced')">Balanced</div>
          <div class="mode-btn" data-mode="conservative" onclick="setMode('conservative')">Konservativ</div>
          <div class="mode-btn" data-mode="tokenmax" onclick="setMode('tokenmax')">Token-Max</div>
        </div>
        <textarea id="queryInput" placeholder="Frage an Ihr Brain stellen…"></textarea>
        <button id="queryBtn" onclick="runQuery()">
          <span id="queryBtnText">Abfragen</span>
        </button>
        <div id="queryResult" class="query-result" style="display:none"></div>
      </div>
    </div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
