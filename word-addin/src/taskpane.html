<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subsumio für Word</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 16px; background: #0a0a18; color: #e8e8f0; font-size: 13px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1e1e3a; }
    .header img { width: 24px; height: 24px; border-radius: 6px; }
    .header h1 { font-size: 15px; margin: 0; color: #e8e8f0; }
    .section { margin-bottom: 16px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #8a8aa8; margin-bottom: 8px; font-weight: 600; }
    input, select { width: 100%; background: #0d0d1a; border: 1px solid #1e1e3a; border-radius: 8px; padding: 8px 10px; color: #e8e8f0; font-size: 13px; margin-bottom: 8px; }
    input::placeholder { color: #4a4a6a; }
    button { width: 100%; background: #6366f1; color: white; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    button:hover { background: #818cf8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .doc-item { padding: 10px; border: 1px solid #1e1e3a; border-radius: 8px; margin-bottom: 8px; background: #0d0d1a; cursor: pointer; transition: border-color 0.15s; }
    .doc-item:hover { border-color: #6366f1; }
    .doc-item .title { font-weight: 500; color: #e8e8f0; margin-bottom: 2px; }
    .doc-item .meta { font-size: 11px; color: #8a8aa8; }
    .status { padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .status.ok { background: #10b98115; border: 1px solid #10b98130; color: #34d399; }
    .status.err { background: #ef444415; border: 1px solid #ef444430; color: #f87171; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <img src="/icon-192.png" alt="Subsumio">
    <h1>Subsumio</h1>
  </div>

  <div class="section">
    <div class="section-title">API-Token</div>
    <input type="password" id="token" placeholder="Subsumio API-Token">
    <button id="connectBtn" onclick="connect()">Verbinden</button>
  </div>

  <div id="status" class="status" style="display:none"></div>

  <div class="section" id="docsSection" style="display:none">
    <div class="section-title">Meine Schriftsätze</div>
    <div id="docsList"></div>
  </div>

  <div class="section" id="pipelineSection" style="display:none">
    <div class="section-title">Pipeline</div>
    <input type="text" id="caseSlug" placeholder="Case Slug (z.B. 2023-on-001)">
    <button id="pipelineBtn" onclick="triggerPipeline()">Pipeline starten</button>
    <div id="pipelineStatus" class="status" style="display:none"></div>
  </div>

  <div class="section" id="chronoSection" style="display:none">
    <div class="section-title">Chronologie einfügen</div>
    <input type="text" id="chronoCase" placeholder="Case Slug">
    <button id="chronoBtn" onclick="insertChronology()">Chronologie generieren & einfügen</button>
  </div>

  <div class="section" id="exportSection" style="display:none">
    <div class="section-title">Als Word exportieren</div>
    <input type="text" id="exportSlug" placeholder="Page Slug">
    <button id="exportBtn" onclick="exportDocx()">.docx herunterladen</button>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
