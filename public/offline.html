<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Sigmabrain</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #06060f; color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .logo {
      width: 64px; height: 64px; border-radius: 16px; background: #7c3aed;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800; color: #fff; margin: 0 auto 24px;
    }
    h1 { font-size: 24px; margin: 0 0 8px; }
    p { color: #8888aa; font-size: 15px; line-height: 1.6; max-width: 380px; margin: 0 auto 24px; }
    button {
      background: #7c3aed; color: #fff; border: 0; border-radius: 10px;
      padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #8b5cf6; }
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">Σ</div>
    <h1>You're offline</h1>
    <p>
      Sigmabrain needs a connection to reach your brain.
      Your data is safe — reconnect and pick up where you left off.<br /><br />
      <em>Du bist offline. Sigmabrain braucht eine Verbindung zu deinem Brain.
      Deine Daten sind sicher — verbinde dich neu und mach genau dort weiter.</em>
    </p>
    <button onclick="location.reload()">Retry / Erneut versuchen</button>
  </main>
</body>
</html>
