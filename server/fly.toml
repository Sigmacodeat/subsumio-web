# Subsumio Engine on Fly.io.  Deploy:  fly launch --no-deploy  &&  fly deploy
# Set secrets first (see docs/DEPLOY_ENGINE.md):
#   fly secrets set GBRAIN_WEB_API_KEY=… GBRAIN_REQUIRE_TENANT=true DATABASE_URL=… OPENAI_API_KEY=…
app = "subsumio-engine"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  GBRAIN_HOME = "/data"
  GBRAIN_REQUIRE_TENANT = "true"
  GBRAIN_HTTP_TRUST_PROXY = "true"
  PORT = "3131"

[http_service]
  internal_port = 3131
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "45s"

# Persistent store for embedded PGLite (omit if you use an external DATABASE_URL).
[[mounts]]
  source = "subsumio_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
