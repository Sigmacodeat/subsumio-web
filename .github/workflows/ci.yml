name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run format:check

  template-leak-check:
    name: Template Variable Leak Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-template-leaks.sh

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Check bundle sizes
        run: |
          LARGE_FILES=$(find .next/static/chunks -name "*.js" -size +500k 2>/dev/null || true)
          if [ -n "$LARGE_FILES" ]; then
            echo "⚠️ Large JS chunks detected (>500KB):"
            echo "$LARGE_FILES"
          fi
          echo "✓ Bundle size check complete"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck || npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test:unit

  check-resolvable:
    name: Skill Tree (Reachability/MECE/DRY)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - working-directory: server
        run: bun install
      - name: Run check-resolvable --strict
        working-directory: server
        run: bun run check:resolver

  server-verify:
    name: Server Engine Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - working-directory: server
        run: bun install
      - name: Run engine verify
        working-directory: server
        run: bun run verify

  release-gate-eval:
    name: AI Quality Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - working-directory: server
        run: bun install
      - name: Run release-gate smoke eval (real PGLite + searchKeyword, no API costs)
        working-directory: server
        run: bun run release-gate:eval

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan (Snyk + bun audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: bun audit (frontend)
        run: bun audit --audit-level=high
        continue-on-error: false
      - name: bun audit (server)
        working-directory: server
        run: bun audit --audit-level=high
        continue-on-error: false
      - uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      - name: Snyk Server Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=server/package.json
          command: monitor

  production-gate:
    name: Production Gate (all checks must pass)
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        format-check,
        build,
        typecheck,
        test,
        check-resolvable,
        server-verify,
        release-gate-eval,
        gitleaks,
        security-scan,
      ]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Checking job results..."
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.format-check.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.check-resolvable.result }}" != "success" || \
                "${{ needs.server-verify.result }}" != "success" || \
                "${{ needs.release-gate-eval.result }}" != "success" || \
                "${{ needs.gitleaks.result }}" != "success" || \
                "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          echo "✅ All required jobs passed — production gate open"
