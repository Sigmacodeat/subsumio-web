name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run format:check

  template-leak-check:
    name: Template Variable Leak Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-template-leaks.sh

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck || npx tsc --noEmit

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Check bundle sizes
        run: |
          # Verify no JS chunk exceeds 500KB (uncompressed)
          LARGE_FILES=$(find .next/static/chunks -name "*.js" -size +500k 2>/dev/null || true)
          if [ -n "$LARGE_FILES" ]; then
            echo "⚠️ Large JS chunks detected (>500KB):"
            echo "$LARGE_FILES"
          fi
          echo "✓ Bundle size check complete"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test:unit

  check-resolvable:
    name: Skill Tree (Reachability/MECE/DRY)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - working-directory: server
        run: bun install
      - name: Run check-resolvable --strict
        working-directory: server
        run: bun run check:resolver

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, format-check, build, typecheck, test]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
        env:
          CI: true

  server-verify:
    name: Server Engine Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - working-directory: server
        run: bun install
      - name: Run engine verify
        working-directory: server
        run: bun run verify

  release-gate-eval:
    name: AI Quality Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - working-directory: server
        run: bun install
      - name: Run release-gate smoke eval (real PGLite + searchKeyword, no API costs)
        working-directory: server
        run: bun run release-gate:eval

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan (Snyk + bun audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: bun audit (frontend)
        run: bun audit --audit-level=high
        continue-on-error: false
      - name: bun audit (server)
        working-directory: server
        run: bun audit --audit-level=high
        continue-on-error: false
      - uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      - name: Snyk Server Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=server/package.json
          command: monitor

  lighthouse-ci:
    name: Lighthouse CI (Performance + SEO)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          urls: |
            http://localhost:3000/
            http://localhost:3000/pricing
            http://localhost:3000/features
            http://localhost:3000/security
            http://localhost:3000/blog
            http://localhost:3000/solutions/law-firms
            http://localhost:3000/benchmark-methodology
            http://localhost:3000/docs
            http://localhost:3000/cities
            http://localhost:3000/cities/wien
          budgetPath: .github/lighthouse-budget.json
          configPath: lighthouserc.json
          serverBaseUrl: http://localhost:3000
          serverCommand: bun run start

  load-test:
    name: Load Test (k6)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Start server in background
        run: bun run start &
        env:
          PORT: 3000
      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run smoke load test
        run: k6 run tests/load/smoke-load.js
        env:
          BASE_URL: http://localhost:3000
      - name: Run stress load test
        run: k6 run tests/load/stress-load.js
        env:
          BASE_URL: http://localhost:3000

  production-gate:
    name: Production Gate (all checks must pass)
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        format-check,
        build,
        typecheck,
        test,
        check-resolvable,
        e2e,
        server-verify,
        release-gate-eval,
        gitleaks,
        security-scan,
      ]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Checking job results..."
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.format-check.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.check-resolvable.result }}" != "success" || \
                "${{ needs.e2e.result }}" != "success" || \
                "${{ needs.server-verify.result }}" != "success" || \
                "${{ needs.release-gate-eval.result }}" != "success" || \
                "${{ needs.gitleaks.result }}" != "success" || \
                "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          echo "✅ All required jobs passed — production gate open"
